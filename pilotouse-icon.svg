<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
 
  <!-- Anillo exterior -->
  <circle cx="540" cy="540" r="380" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.5"/>
  <!-- Anillo interior -->
  <circle cx="540" cy="540" r="256" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.25"/>
 
  <!-- Ticks cardinales -->
  <!-- Norte (lima) -->
  <line x1="540" y1="160" x2="540" y2="252" stroke="#C8F075" stroke-width="20" stroke-linecap="round"/>
  <!-- Sur -->
  <line x1="540" y1="828" x2="540" y2="920" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- Oeste -->
  <line x1="160" y1="540" x2="252" y2="540" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <!-- Este -->
  <line x1="828" y1="540" x2="920" y2="540" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
 
  <!-- Ticks diagonales menores -->
  <line x1="268" y1="268" x2="338" y2="338" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <line x1="742" y1="742" x2="812" y2="812" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <line x1="812" y1="268" x2="742" y2="338" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <line x1="268" y1="812" x2="338" y2="742" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
 
  <!-- Aguja Norte — Lima -->
  <polygon points="540,252 506,540 540,500 574,540" fill="#C8F075"/>
  <!-- Aguja Sur — Blanco semitransparente -->
  <polygon points="540,828 506,540 540,580 574,540" fill="#FFFFFF" opacity="0.5"/>
 
  <!-- Centro pip -->
  <circle cx="540" cy="540" r="44" fill="#C8F075"/>
  <circle cx="540" cy="540" r="20" fill="#FFFFFF" opacity="0.15"/>
 
</svg>
 
